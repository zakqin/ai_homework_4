services:
  rag-api:
    build:
      context: .
      dockerfile: docker.Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - uploads_data:/app/uploads
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://rag-api:8000
      - OFFLINE_MODE=true
    depends_on:
      - rag-api

volumes:
  chroma_data:
  uploads_data: